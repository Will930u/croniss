<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title-tag">CRONISS</title>
    <link id="page-favicon-tag" rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/a/a7/Blank_image.svg">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght=600;700&family=Inter:wght=400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #0077ff; 
            --frozen-white: #e2f0ff;
            --dark-bg: #030712; 
            --panel-gradient: linear-gradient(180deg, #111827 0%, #030712 100%);
            --border-metal: rgba(99, 140, 255, 0.3);
        }

        body {
            margin: 0; padding: 20px;
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        header { text-align: center; margin-bottom: 30px; width: 100%; max-width: 500px; }
        header h1 {
            font-family: 'Rajdhani', sans-serif; font-size: 2.5rem; margin: 0; color: var(--frozen-white);
            text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 119, 255, 0.5);
        }

        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 20px; }

        .panel {
            background: var(--panel-gradient);
            border: 1px solid var(--border-metal);
            border-radius: 14px; padding: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7), 
                        inset 0 1px 2px rgba(255, 255, 255, 0.1),
                        0 0 15px rgba(0, 119, 255, 0.1);
            transform: perspective(800px) translateZ(0);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .panel:hover {
            transform: perspective(800px) translateZ(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), inset 0 1px 2px rgba(255, 255, 255, 0.15), 0 0 25px rgba(0, 119, 255, 0.2);
        }

        .panel-title {
            font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; margin-top: 0; margin-bottom: 15px;
            color: var(--neon-blue); text-transform: uppercase; letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .bcv-container {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(0, 119, 255, 0.4);
            border-radius: 10px; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 4px 10px rgba(0,0,0,0.3);
        }
        .bcv-label { font-family: 'Rajdhani', sans-serif; font-weight: 700; color: #94a3b8; }
        .bcv-value { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.3rem; color: #00ffcc; text-shadow: 0 0 8px rgba(0, 255, 204, 0.4); }

        .carousel {
            position: relative; width: 100%; height: 250px; border-radius: 8px; overflow: hidden;
            background-color: #000; border: 1px solid rgba(255,255,255,0.1);
        }
        .carousel img { width: 100%; height: 100%; object-fit: cover; }
        .carousel-caption {
            position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 15px; font-size: 0.9rem; color: #cbd5e1; text-align: center;
        }

        .menu-grid { display: flex; flex-direction: column; gap: 10px; }

        .service-link {
            display: block; background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 14px;
            color: var(--frozen-white); text-decoration: none; font-weight: 600; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .service-link:hover {
            background: rgba(0, 119, 255, 0.15); border-color: var(--neon-blue);
            transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0, 119, 255, 0.3);
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }
        input[type="text"], input[type="email"], input[type="password"], textarea, select {
            width: 100%; padding: 10px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px; color: white; font-family: inherit; box-sizing: border-box;
        }

        .btn-submit {
            width: 100%; padding: 12px; background: linear-gradient(180deg, #0088ff 0%, #0055cc 100%);
            border: none; border-radius: 6px; color: white; font-weight: 600; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .manager-item {
            display: flex; align-items: center; justify-content: space-between; padding: 10px;
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; margin-bottom: 8px;
        }
        .btn-delete-small {
            background: #b91c1c; border: none; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem;
        }
        .counter-badge { font-size: 0.8rem; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 20px; color: #94a3b8; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>

    <header><h1 id="main-header-title">CRONISS</h1></header>

    <div class="container">
        <div class="panel">
            <div class="bcv-container">
                <span class="bcv-label">TASA OFICIAL BCV</span>
                <span class="bcv-value" id="bcv-rate">Bs. 0.00</span>
            </div>
        </div>

        <div class="panel">
            <h2 class="panel-title">Nuestros Trabajos</h2>
            <div class="carousel">
                <img id="carousel-trabajo-img" src="https://upload.wikimedia.org/wikipedia/commons/a/a7/Blank_image.svg">
                <div class="carousel-caption" id="carousel-trabajo-desc">Cargando...</div>
            </div>
        </div>

        <div class="panel">
            <h2 class="panel-title">Servicios Disponibles</h2>
            <div class="menu-grid" id="menu-servicios"></div>
        </div>

        <div class="panel">
            <h2 class="panel-title">Instalaciones</h2>
            <div class="menu-grid" id="menu-instala"></div>
        </div>

        <div class="panel">
            <h2 class="panel-title">Reseñas de Clientes</h2>
            <div class="carousel">
                <img id="carousel-captura-img" src="https://upload.wikimedia.org/wikipedia/commons/a/a7/Blank_image.svg">
            </div>
        </div>

        <div class="panel" id="login-box">
            <h2 class="panel-title">Panel de Control</h2>
            <div class="form-group"><label>Correo</label><input type="email" id="admin-email"></div>
            <div class="form-group"><label>Contraseña</label><input type="password" id="admin-password"></div>
            <button class="btn-submit" onclick="manejarLoginAdmin()">Iniciar Sesión</button>
        </div>

        <div class="panel" id="panel-admin-box" style="display: none;">
            <div class="panel-title"><span>Consola Admin</span><button style="background:#ef4444; border:none; padding:4px 8px; color:white; border-radius:4px;" onclick="cerrarSesionAdmin()">Salir</button></div>
            
            <div style="margin-bottom:20px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">
                <h3 style="font-size:0.9rem; color:#94a3b8; margin-top:0;">Ajustes Globales y Tasa BCV</h3>
                <input type="text" id="cfg-tasa" placeholder="Tasa del día (Ej: 41.65)" style="margin-bottom:5px;">
                <input type="text" id="cfg-title" placeholder="Título de la Web" style="margin-bottom:5px;">
                <input type="text" id="cfg-favicon" placeholder="URL Favicon" style="margin-bottom:5px;">
                <input type="text" id="cfg-telefono" placeholder="WhatsApp (Ej: 584120000000)" style="margin-bottom:5px;">
                <button class="btn-submit" onclick="guardarConfiguracionGlobal()">Guardar Ajustes</button>
            </div>

            <div style="margin-bottom:20px;">
                <h3 style="font-size:0.9rem; color:#94a3b8;">Publicar Trabajo</h3>
                <input type="file" id="img-trabajo" style="margin-bottom:5px;">
                <textarea id="desc-trabajo" placeholder="Descripción..." style="margin-bottom:5px;"></textarea>
                <button class="btn-submit" onclick="agregarTrabajoFirebase()">Subir Trabajo</button>
                <div id="lista-borrar-trabajos" style="margin-top:10px;"></div>
            </div>

            <div style="margin-bottom:20px; border-top:1px solid rgba(255,255,255,0.1); padding-top:10px;">
                <h3 style="font-size:0.9rem; color:#94a3b8;">Crear Botón</h3>
                <input type="text" id="menu-name" placeholder="Texto Botón" style="margin-bottom:5px;">
                <input type="text" id="menu-msg" placeholder="Mensaje de WhatsApp" style="margin-bottom:5px;">
                <select id="menu-category" style="margin-bottom:5px;">
                    <option value="servicios">Servicios</option>
                    <option value="instalaciones">Instalaciones</option>
                </select>
                <button class="btn-submit" onclick="agregarElementoMenu()">Crear Botón</button>
                <div id="lista-borrar-servicios" style="margin-top:10px;"></div>
            </div>

            <div style="border-top:1px solid rgba(255,255,255,0.1); padding-top:10px;">
                <h3 style="font-size:0.9rem; color:#94a3b8;">Subir Reseña</h3>
                <input type="file" id="img-captura" style="margin-bottom:5px;">
                <button class="btn-submit" onclick="agregarCapturaFirebase()">Subir Reseña</button>
                <div id="lista-borrar-capturas" style="margin-top:10px;"></div>
            </div>
        </div>

        <footer style="text-align:center; padding:15px; font-size:0.8rem; color:#64748b;">
            Visitas Totales: <span id="visitas-display" class="counter-badge">0</span>
        </footer>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDgDCPM8VW2fZ8SaKOnztYE5We4_jyJ0k",
            authDomain: "croniss-web.firebaseapp.com",
            projectId: "croniss-web",
            storageBucket: "croniss-web.firebasestorage.app",
            messagingSenderId: "491031905042",
            appId: "1:491031905042:web:3b0c814dd66101b47b29cb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const _0x4f1b = ["0a5e7954b4b9fed188e15e4e5532e57b"];
        const IMGBB_API_KEY = _0x4f1b[0];
        let telefonoGlobal = "584243497259"; 

        function gestionarContadorVisitas() {
            const ahora = new Date();
            const idDia = `${ahora.getFullYear()}-${String(ahora.getMonth() + 1).padStart(2, '0')}-${String(ahora.getDate()).padStart(2, '0')}`;
            db.collection("metricas").doc("global").onSnapshot(doc => {
                if (doc.exists) document.getElementById("visitas-display").innerText = doc.data().total || 0;
            });
            if (localStorage.getItem("croniss_visited_date") !== idDia) {
                localStorage.setItem("croniss_visited_date", idDia);
                db.collection("metricas").doc("global").set({ total: firebase.firestore.FieldValue.increment(1) }, { merge: true });
            }
        }

        function manejarLoginAdmin() {
            const email = document.getElementById("admin-email").value.trim();
            const pass = document.getElementById("admin-password").value.trim();
            if(email && pass) auth.signInWithEmailAndPassword(email, pass).catch(err => alert(err.message));
        }

        function cerrarSesionAdmin() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            const loginBox = document.getElementById("login-box");
            const adminBox = document.getElementById("panel-admin-box");
            if (user) {
                if(loginBox) loginBox.style.display = "none";
                if(adminBox) adminBox.style.display = "block";
            } else {
                if(adminBox) adminBox.style.display = "none";
                if(loginBox) loginBox.style.display = "block";
            }
        });

        async function subirImagenImgBB(file) {
            const formData = new FormData(); formData.append("image", file);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                const data = await res.json();
                return data.success ? data.data.url : null;
            } catch { return null; }
        }

        async function agregarTrabajoFirebase() {
            const file = document.getElementById("img-trabajo").files[0];
            const desc = document.getElementById("desc-trabajo").value.trim();
            if(!file || !desc) return alert("Completa los campos");
            const url = await subirImagenImgBB(file);
            if(url) db.collection("trabajos").add({ img: url, desc: desc, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        }

        async function agregarCapturaFirebase() {
            const file = document.getElementById("img-captura").files[0];
            if(!file) return alert("Elige una imagen");
            const url = await subirImagenImgBB(file);
            if(url) db.collection("capturas").add({ img: url, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        }

        function agregarElementoMenu() {
            const name = document.getElementById("menu-name").value.trim();
            const msg = encodeURIComponent(document.getElementById("menu-msg").value.trim());
            const cat = document.getElementById("menu-category").value;
            if(name && msg) db.collection("menus").add({ name: name, msg: msg, category: cat, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        }

        function borrarElementoFirebase(col, id) { if(confirm("¿Eliminar?")) db.collection(col).doc(id).delete(); }

        let trabajosLocales = [], indexT = 0, capturasLocales = [], indexC = 0;

        function escucharConfiguracionGlobal() {
            db.collection("config").doc("global").onSnapshot(doc => {
                if(doc.exists) {
                    const d = doc.data();
                    if(d.title) { document.title = d.title; document.getElementById('main-header-title').innerText = d.title; }
                    if(d.favicon) document.getElementById("page-favicon-tag").href = d.favicon;
                    if(d.telefono) telefonoGlobal = d.telefono;
                    
                    // Render de Tasa Manual desde Firebase
                    if(d.tasa) {
                        document.getElementById('bcv-rate').innerText = `Bs. ${parseFloat(d.tasa).toFixed(2)}`;
                    } else {
                        document.getElementById('bcv-rate').innerText = "Bs. 41.50";
                    }

                    // Rellenado seguro de inputs en consola admin si existen en el DOM
                    if(document.getElementById("cfg-title")) document.getElementById("cfg-title").value = d.title || "";
                    if(document.getElementById("cfg-favicon")) document.getElementById("cfg-favicon").value = d.favicon || "";
                    if(document.getElementById("cfg-telefono")) document.getElementById("cfg-telefono").value = d.telefono || "";
                    if(document.getElementById("cfg-tasa")) document.getElementById("cfg-tasa").value = d.tasa || "";
                }
            });
        }

        function guardarConfiguracionGlobal() {
            const t = document.getElementById("cfg-title").value.trim();
            const f = document.getElementById("cfg-favicon").value.trim();
            const p = document.getElementById("cfg-telefono").value.trim();
            const ts = document.getElementById("cfg-tasa").value.trim();
            const up = {}; 
            if(t) up.title = t; 
            if(f) up.favicon = f; 
            if(p) up.telefono = p;
            if(ts) up.tasa = ts;
            if(Object.keys(up).length > 0) db.collection("config").doc("global").set(up, {merge:true}).then(() => alert("Ajustes guardados"));
        }

        function sincronizarBaseDeDatos() {
            db.collection("trabajos").orderBy("timestamp", "desc").onSnapshot(snap => {
                trabajosLocales = [];
                const list = document.getElementById("lista-borrar-trabajos"); if(list) list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data(); trabajosLocales.push(d);
                    if(list) list.innerHTML += `<div class="manager-item"><span>${d.desc}</span><button class="btn-delete-small" onclick="borrarElementoFirebase('trabajos','${doc.id}')">Eliminar</button></div>`;
                });
                if(trabajosLocales.length > 0) {
                    document.getElementById("carousel-trabajo-img").src = trabajosLocales[0].img;
                    document.getElementById("carousel-trabajo-desc").innerText = trabajosLocales[0].desc;
                }
            });

            db.collection("capturas").orderBy("timestamp", "desc").onSnapshot(snap => {
                capturasLocales = [];
                const list = document.getElementById("lista-borrar-capturas"); if(list) list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data(); capturasLocales.push(d);
                    if(list) list.innerHTML += `<div class="manager-item"><span>ID: ${doc.id.substring(0,5)}</span><button class="btn-delete-small" onclick="borrarElementoFirebase('capturas','${doc.id}')">Eliminar</button></div>`;
                });
                if(capturasLocales.length > 0) document.getElementById("carousel-captura-img").src = capturasLocales[0].img;
            });

            db.collection("menus").orderBy("timestamp", "desc").onSnapshot(snap => {
                const m1 = document.getElementById("menu-servicios");
                const m2 = document.getElementById("menu-instala");
                const list = document.getElementById("lista-borrar-servicios");
                if(m1) m1.innerHTML = ""; if(m2) m2.innerHTML = ""; if(list) list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const a = document.createElement("a"); a.className = "service-link";
                    a.href = `https://wa.me/${telefonoGlobal}?text=${d.msg}`; a.target = "_blank"; a.innerText = d.name;
                    if(d.category === "servicios" && m1) m1.appendChild(a); else if(m2) m2.appendChild(a);
                    if(list) list.innerHTML += `<div class="manager-item"><span>${d.name}</span><button class="btn-delete-small" onclick="borrarElementoFirebase('menus','${doc.id}')">Eliminar</button></div>`;
                });
            });
        }

        escucharConfiguracionGlobal(); sincronizarBaseDeDatos(); gestionarContadorVisitas();
        setInterval(() => {
            if(trabajosLocales.length > 0) { indexT = (indexT + 1) % trabajosLocales.length; document.getElementById("carousel-trabajo-img").src = trabajosLocales[indexT].img; document.getElementById("carousel-trabajo-desc").innerText = trabajosLocales[indexT].desc; }
        }, 4000);
        setInterval(() => {
            if(capturasLocales.length > 0) { indexC = (indexC + 1) % capturasLocales.length; document.getElementById("carousel-captura-img").src = capturasLocales[indexC].img; }
        }, 4500);
    </script>
</body>
</html>
